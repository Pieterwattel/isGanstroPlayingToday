  <body id="body">

      <img src="./ireland-flag-25.gif" alt="ireland flag" />

    </header>

    <main>
        <h1>Is Gan Stró! playing today?</h1>
        <h3>No.. :&#40;</h3>

  <img id="randomImage" alt="Random pic">

  <p id="statusText"></p>

  <script>
  window.onload = function() {
    // 1️⃣ Random image
    const images = [
      "pics/All of Gan Stró! says.png",
      "pics/Boet says.png",
      "pics/Fiddle Henjo yells.png",
      "pics/Gan Stró! exclaims.png",
      "pics/Henjo says.png",
      "pics/Jaro whispers.png",
      "pics/Omar and Jaro say.png",
      "pics/Pieter and Henjo say.png",
      "pics/Pieter, Boet, Selma and Jaro say.png",
      "pics/Joosje says.png"

    ];

    const randomIndex = Math.floor(Math.random() * images.length);
    const selectedImage = images[randomIndex];

    const imgElement = document.getElementById("randomImage");
    if (imgElement) imgElement.src = selectedImage;

    //  Get filename nicely
    let filename = selectedImage.split("/").pop().split(".")[0];
    filename = filename.replace(/_/g, " "); // replace underscores with spaces
    // Optional: capitalize first letters
    filename = filename.replace(/\b\w/g, c => c);

    // Calculate days until March 17
    const today = new Date();
    let target = new Date(today.getFullYear(), 2, 17); // 2 = March
    if (today > target) target = new Date(today.getFullYear() + 1, 2, 17);
    const diffMs = target - today;
    const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

    // Insert into HTML
    const statusElement = document.getElementById("statusText");
    if (statusElement) {
      statusElement.textContent = `${filename}: it's still ${diffDays} days until st patricks day!`;
    }
  };
  </script>

<p id="statusText"></p>
    </main>
